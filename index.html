        .button {

        }

        .theclock {

            bottom: 0;

        }

        @media (max-width: 768px) {

                flex-direction: row;

            }

            .thebigtittle {
                display: block;

                font-weight: bold;
                text-align: center;
                order: 1;
                flex: 1;
                margin: 0 10px;
                line-height: 1.2;
                white-space: nowrap;
            }

            .upmenubuttons {
                display: none;
            }

            .theclock {
                margin-top: 150px;
                font-size: 18px;
                width: 80%;
                padding: 20px 30px;
            }

            #timer {
                font-size: 35px;
            }

            .buttonformobileoptionspage {
                background-color: transparent;
                color: white;
                font-size: 32px;
                padding: 5px 10px;
                border: none;
                cursor: pointer;
                position: fixed;
                left: 20px;
                top: 15px;
                z-index: 2001;
                transition: all 0.3s ease;
                border-radius: 5px;
                order: 0;
            }

            .buttonformobileoptionspage:hover {
                background: rgba(255, 255, 255, 0.1);
                transform: scale(1.1);
            }

            .buttonformobileoptionspage:active {

            }

            .buttonformobileoptionspage:focus {
                outline: none;
            }

            .mobilephonemenu {
                position: fixed;
                top: 0;
                left: -250px;
                width: 250px;
                height: 100%;
                background-color: #9ea5a4;
                transition: all 0.3s ease;
                display: flex;
                flex-direction: column;

                z-index: 2000;

                box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            }

            .mobilephonemenu.open {
                left: 0;
            }

            .mobilephonemenu .button {
                margin: 10px 0;
                width: 100%;
                padding: 15px;
                font-size: 18px;
                background: transparent;
                color: white;
                border: none;
                text-align: left;
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            }

            .mobilephonemenu .button:before::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 0;
                background: #03fbff;

            .mobilephonemenu .button:hover {

        @media (max-width: 480px) {

        .theclock-containingpage {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .theclock-text {
            font-size: 25px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3),
                         -2px -2px 4px rgba(255, 255, 255, 0.1);
            letter-spacing: 2px;
            margin-top: 20px;
            text-align: center;
            position: relative;
            animation: glow 2s ease-in-out infinite alternate,
                       slideIn 1.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes slideIn {
            0% {
                transform: translateX(-100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes glow {
            from {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3),
                            -2px -2px 4px rgba(255, 255, 255, 0.1);
            }
            to {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3),
                            -2px -2px 4px rgba(255, 255, 255, 0.1),
                            0 0 10px rgba(255, 255, 255, 0.5),

        }

        .theclock-item {

        }

        .theclock-number {
            font-size: 45px;
            font-weight: bold;
            color: #9ea5a4;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            position: relative;
            height: 60px;
            overflow: hidden;
        }

        @keyframes slideDown {
            0% {
                transform: translateY(100%);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .theclock-number.sliding-down {
            animation: slideDown 0.5s ease-out;
        }

        .theclock-label {
            font-size: 16px;
            color: #fff;
            margin-top: 5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .important-title {
            font-size: 36px;
            font-weight: 900;
            color: #9ea5a4;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            box-shadow: none;
            text-align: center;
            width: 80%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .important-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }
            20% {
                left: 100%;
            }
            100% {
                left: 100%;
            }
        }
    </style>

<body>

    <div class="overlay">
        <img src="img/yourlogo.png" alt="your logo" class="logo">
        <div class="thebigtittle">your text here</div>

    <div class="theclock">
        <div class="theclock-containingpage">
            <div class="theclock-item">
                <div class="theclock-number" id="days">00</div>

   <main class="contentofthepage">
        <section class="thebefore::beforesection">
            <h1>Your main text here</h1>
        </section>
        <section class="thebefore::beforesection">
            <p> your second text here

            </p>
        </section>
    </main></p>

    <div class="footer">
        <p>Copyrights © yourwebsite - All rights are reserved.</p>
    </div>

    <script>
        const date = {
            days: 0,
            hours: 0,
            minutes: 0,
            seconds: 0
        };

        function updatetheclock() {
            const timestarting = Date.now();
            const timeending = new Date('2026-04-24 10:30:00Z');
            const duration = timeending.valueOf() - timestarting.valueOf();

            if (duration <= 0) {
                date.days = 0;
                date.hours = 0;
                date.minutes = 0;
                date.seconds = 0;
                changeclock();
                return;
            }

            date.days = Math.floor(duration / (1000 * 60 * 60 * 24));
            date.hours = Math.floor((duration % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            date.minutes = Math.floor((duration % (1000 * 60 * 60)) / (1000 * 60));
            date.seconds = Math.floor((duration % (1000 * 60)) / 1000);

            changeclock();
        }

        function changeclock() {
            const secondsElement = document.getElementById("seconds");
            const oldSeconds = secondsElement.textContent;
            const newSeconds = date.seconds.toString().padStart(2, '0');
            
            if (oldSeconds !== newSeconds) {
                secondsElement.classList.add('sliding-up');
                setTimeout(() => {
                    secondsElement.textContent = newSeconds;
                    secondsElement.classList.remove('sliding-up');
                    secondsElement.classList.add('sliding-down');
                    setTimeout(() => {
                        secondsElement.classList.remove('sliding-down');
                    }, 500);
                }, 500);
            }
            document.getElementById("days").textContent = date.days.toString().padStart(2, '0');
            document.getElementById("hours").textContent = date.hours.toString().padStart(2, '0');
            document.getElementById("minutes").textContent = date.minutes.toString().padStart(2, '0');
        }

        setInterval(updatetheclock, 1000);
        updatetheclock();

        function togglemobilephonemenu() {
            const mobilephonemenu = document.getElementById("mobilephonemenu");
            mobilephonemenu.classList.toggle("open");
            
            const mobilephonemenuButtons = mobilephonemenu.getElementsByClassName("button");
            for (let button of mobilephonemenuButtons) {
                if (!mobilephonemenu.classList.contains("open")) {
                    buttonevents = "none";
                } else {
                    buttonevents = "auto";
                }
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            const mobilephonemenu = document.getElementById("mobilephonemenu");
            const mobilephonemenuButtons = mobilephonemenu.getElementsByClassName("button");
            for (let button of mobilephonemenuButtons) {
                buttonevents = "none";
            }
        });
    </script>
